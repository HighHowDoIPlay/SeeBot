PowerLevel.Mismatch.Header=Power Level Mismatch?
PowerLevel.Mismatch.Body=If your Power Level is showing lower than in game, it is likely because %arg0% uses your top three (3) weapons in your **Schematic** inventory, while the game will use the top three (3) weapons in your **Backpack**. This is because %arg0% cannot see Backpack inventories without authentication. To fix the mismatch, level up 3 of your *weapon* schematics.
BPLevel.Mismatch.Header=Battle Pass Level Mismatch?
BPLevel.Mismatch.Body=If %arg0% is displaying a different Battle Pass level than what you see in game, it can be due to one of the following reasons:\n1: You have not played a Battle Royale or Creative match since gaining levels.\n Due to how the API works, the specific endpoint %arg0% uses only updates after specific game modes have been played.\n2:Your profile is private and %arg0% cannot retrieve your data.\nSee [The FAQ for more help](<https://seebot.dev/faq.php>).\n3: The API is having an issue.\nSometimes AWS goes out, or other API errors occur and this can result in a delay or failure to retrieve the current data.